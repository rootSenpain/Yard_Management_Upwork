server {
    listen 80;
    server_name localhost;

    # Backend API, Swagger Docs and OpenAPI Schema
    # All general traffic is routed to the FastAPI container
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # These are required for Swagger UI assets and openapi.json
        proxy_redirect off;
    }

    # WebSocket (Socket.io) Implementation
    # Critical for real-time driver updates and work queue sync
    location /socket.io/ {
        proxy_pass http://api:8000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Disable buffering for real-time performance
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Long timeout for persistent WebSocket connections
        proxy_read_timeout 86400;
    }
}